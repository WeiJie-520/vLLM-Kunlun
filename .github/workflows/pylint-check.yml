name: Code Style Check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  pylint-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tools
        run: |
          pip install black isort ruff

      - name: Get changed python files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            files=$(git diff --name-only HEAD~1...HEAD)
          fi

          files=$(echo "$files" | grep '\.py$' || true)

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run black
        if: steps.changed.outputs.files != ''
        run: |
          echo "${{ steps.changed.outputs.files }}" | xargs black --check

      - name: Run isort
        if: steps.changed.outputs.files != ''
        run: |
          echo "${{ steps.changed.outputs.files }}" | xargs isort --check-only

      - name: Run ruff
        if: steps.changed.outputs.files != ''
        run: |
          echo "${{ steps.changed.outputs.files }}" | xargs ruff check

      - name: "pylint with action"
        uses: davidslusser/actions_python_pylint@v1.0.0
        with:
          src: ${{ steps.changed.outputs.files }}
          options: "--cov=src"
          pip_install_command: "pip install -e .[dev]"
          python_version: "3.10"
